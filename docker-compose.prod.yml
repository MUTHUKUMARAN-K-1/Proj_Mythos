# Mythos — Production Docker Compose
# Deploy frontend to Vercel, backend to Railway (recommended)
# This compose is for self-hosted production environments only.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: mythos-backend:latest
    container_name: mythos-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - MYTHOS_PROGRAM_ID=${MYTHOS_PROGRAM_ID:-FGG8363rUtdVernzHtXr4AD9PS9m4BezgAN8MJKcybpM}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - HELIUS_RPC_URL=${HELIUS_RPC_URL:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SOLANA_DEMO_MODE=${SOLANA_DEMO_MODE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mythos-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: mythos-frontend:latest
    container_name: mythos-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mythos-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  mythos-network:
    driver: bridge
