services:
  # ============================================================================
  # Mythos Backend — FastAPI + Solana agent stack
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mythos-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - MYTHOS_PROGRAM_ID=${MYTHOS_PROGRAM_ID:-FGG8363rUtdVernzHtXr4AD9PS9m4BezgAN8MJKcybpM}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - HELIUS_RPC_URL=${HELIUS_RPC_URL:-https://devnet.helius-rpc.com/?api-key=}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SOLANA_DEMO_MODE=${SOLANA_DEMO_MODE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - mythos-network

  # ============================================================================
  # Mythos Frontend — Vite/React (production build)
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mythos-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mythos-network

volumes:
  ollama-data:

networks:
  mythos-network:
    driver: bridge
